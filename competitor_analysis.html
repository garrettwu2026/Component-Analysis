<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>競品規格與價格分析系統 V2</title>
    <style>
        :root { --bg-color: #f4f7f6; --text-color: #333; --border-color: #ddd; --primary-color: #2c3e50; --action-color: #e74c3c; --card-bg: #fff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .control-panel { background: var(--card-bg); padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 4px; box-sizing: border-box; }
        .url-list { margin-bottom: 15px; }
        .url-item { display: flex; gap: 10px; margin-bottom: 10px; }
        .url-item input { flex-grow: 1; }
        button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn-add { background: #3498db; color: white; }
        .btn-remove { background: #95a5a6; color: white; }
        .btn-fetch { background: var(--action-color); color: white; font-size: 1.2em; width: 100%; padding: 15px; margin-top: 10px; }
        .btn-fetch:hover { background: #c0392b; }
        
        .dashboard { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; }
        .brand-column { flex: 0 0 350px; background: var(--card-bg); border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 5px solid; }
        .brand-title { text-align: center; font-size: 1.2em; font-weight: bold; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid var(--border-color); }
        .product-card { border: 1px solid var(--border-color); border-radius: 6px; padding: 15px; margin-bottom: 15px; background: #fafafa; }
        .product-name { font-weight: bold; font-size: 1.1em; color: var(--primary-color); margin-bottom: 10px; line-height: 1.4; }
        .price-section { display: flex; justify-content: space-between; background: #e8f4f8; padding: 8px; border-radius: 4px; margin-bottom: 10px; }
        .current-price { color: #d35400; font-weight: bold; font-size: 1.2em; }
        .original-price { text-decoration: line-through; color: #7f8c8d; font-size: 0.9em; }
        .discount { color: #27ae60; font-weight: bold; font-size: 0.9em; }
        .specs-list { margin: 0; padding-left: 20px; font-size: 0.9em; color: #555; }
        #loading { display: none; text-align: center; font-weight: bold; color: var(--primary-color); margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="control-panel">
        <div class="form-group">
            <label for="apiKey">Google API Key:</label>
            <input type="password" id="apiKey" placeholder="輸入您的 API 金鑰">
        </div>
        <div class="form-group">
            <label for="aiModel">選擇 AI 模型:</label>
            <select id="aiModel">
                <option value="gemini-3.1-pro">Gemini 3.1 Pro (最新旗艦，推理能力最強)</option>
                <option value="gemini-3.0-flash">Gemini 3.0 Flash (最新輕量，速度與成本平衡)</option>
                <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
            </select>
        </div>

        <label>競品網址列表 (URLs):</label>
        <div id="urlContainer" class="url-list">
            <div class="url-item">
                <input type="text" class="product-url" placeholder="https://example.com/product">
                <button class="btn-remove" onclick="removeUrl(this)">刪除</button>
            </div>
        </div>
        <button class="btn-add" onclick="addUrl()">+ 新增網址</button>

        <button class="btn-fetch" onclick="fetchAndAnalyze()">抓取產品價格與規格</button>
    </div>

    <div id="loading">系統處理中：正在解析網頁與呼叫 AI 模型... </div>
    <div class="dashboard" id="dashboard"></div>
</div>

<script>
    const brandColors = ['#3498db', '#e67e22', '#9b59b6', '#1abc9c', '#f1c40f', '#34495e'];

    function addUrl() {
        const container = document.getElementById('urlContainer');
        const div = document.createElement('div');
        div.className = 'url-item';
        div.innerHTML = `<input type="text" class="product-url" placeholder="https://..."><button class="btn-remove" onclick="removeUrl(this)">刪除</button>`;
        container.appendChild(div);
    }

    function removeUrl(button) { button.parentElement.remove(); }

    async function fetchAndAnalyze() {
        const apiKey = document.getElementById('apiKey').value;
        const model = document.getElementById('aiModel').value;
        const urlInputs = document.querySelectorAll('.product-url');
        const dashboard = document.getElementById('dashboard');
        const loading = document.getElementById('loading');
        
        if (!apiKey) { alert('請輸入 API Key。'); return; }

        let urls = Array.from(urlInputs).map(input => input.value.trim()).filter(url => url !== '');
        if (urls.length === 0) { alert('請至少輸入一個產品網址。'); return; }

        dashboard.innerHTML = '';
        loading.style.display = 'block';
        let productsData = [];

        for (const url of urls) {
            try {
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
                const response = await fetch(proxyUrl);
                const htmlText = await response.text();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                
                // 強化特徵提取：優先抓取 title 與 meta description
                const pageTitle = doc.title || '無標題';
                const metaDesc = doc.querySelector('meta[name="description"]')?.content || '無描述';
                const rawText = doc.body.innerText.replace(/\s+/g, ' ').substring(0, 12000);
                
                const combinedText = `網頁標題: ${pageTitle}\n網頁描述: ${metaDesc}\n網頁內文: ${rawText}`;
                
                // 供開發者除錯用：按 F12 檢查 Console，確認是否被防爬蟲機制阻擋
                console.log(`[抓取結果] ${url} \n標題: ${pageTitle}\n前200字: ${rawText.substring(0, 200)}`);

                const aiResult = await callGeminiAPI(apiKey, model, combinedText);
                if (aiResult) productsData.push(aiResult);

            } catch (error) {
                console.error(`讀取 ${url} 失敗:`, error);
            }
        }

        loading.style.display = 'none';
        renderDashboard(productsData);
    }

    async function callGeminiAPI(apiKey, model, text) {
        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
        
        const prompt = `
        你是一個嚴謹的產品規格分析系統。請閱讀以下網頁資訊（包含標題、描述與內文），並嚴格以 JSON 格式輸出。
        若內文顯示類似 "Just a moment", "Cloudflare" 或 "請驗證" 等字眼，代表網頁被阻擋，請在 name 填入 "網頁抓取被阻擋"。
        
        提取邏輯：
        1. 優先從「網頁標題」或「網頁描述」提取「產品完整名稱」與「廠牌」。
        2. 價格與規格請從「網頁內文」中尋找。
        3. 找不到資訊請填寫 null。嚴禁輸出 Markdown 標籤 (如 \`\`\`json)，純輸出 JSON 字串。
        
        格式要求：
        {
          "brand": "廠牌名稱 (大寫)",
          "name": "產品完整名稱 (必須盡可能詳細，包含型號)",
          "specs": ["主要規格1", "主要規格2"],
          "originalPrice": 原始價格 (純數字),
          "currentPrice": 當前價格 (純數字),
          "discount": "折扣幅度"
        }
        
        輸入資訊：
        ${text}
        `;

        try {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0.1 }
                })
            });
            
            const data = await res.json();
            const textResponse = data.candidates[0].content.parts[0].text;
            const cleanJsonString = textResponse.replace(/```json/g, '').replace(/```/g, '').trim();
            return JSON.parse(cleanJsonString);
        } catch (err) {
            console.error('API 呼叫或解析失敗:', err);
            return null;
        }
    }

    function renderDashboard(products) {
        const dashboard = document.getElementById('dashboard');
        const groupedData = products.reduce((acc, curr) => {
            const brand = (curr.brand || '未分類').toUpperCase();
            if (!acc[brand]) acc[brand] = [];
            acc[brand].push(curr);
            return acc;
        }, {});

        Object.keys(groupedData).forEach(brand => {
            groupedData[brand].sort((a, b) => (b.currentPrice || 0) - (a.currentPrice || 0));
        });

        let colorIndex = 0;
        for (const [brand, items] of Object.entries(groupedData)) {
            const color = brandColors[colorIndex % brandColors.length];
            colorIndex++;

            const colDiv = document.createElement('div');
            colDiv.className = 'brand-column';
            colDiv.style.borderTopColor = color;
            colDiv.innerHTML = `<div class="brand-title" style="color: ${color}">${brand}</div>`;

            items.forEach(product => {
                const specsHtml = (product.specs || []).map(s => `<li>${s}</li>`).join('');
                colDiv.innerHTML += `
                    <div class="product-card">
                        <div class="product-name">${product.name || '未知產品'}</div>
                        <div class="price-section">
                            <div>
                                <span class="current-price">$${product.currentPrice || 'N/A'}</span><br>
                                <span class="original-price">$${product.originalPrice || 'N/A'}</span>
                            </div>
                            <div class="discount">${product.discount || ''}</div>
                        </div>
                        <ul class="specs-list">${specsHtml}</ul>
                    </div>
                `;
            });
            dashboard.appendChild(colDiv);
        }
    }
</script>

</body>
</html>
