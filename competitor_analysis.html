<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>競品規格與價格分析系統 V5</title>
    <style>
        :root { --bg-color: #f4f7f6; --text-color: #333; --border-color: #bdc3c7; --primary-color: #2c3e50; --action-color: #e74c3c; --card-bg: #fff; --row-header-bg: #34495e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        
        /* Layout */
        .app-wrapper {
            display: flex;
            gap: 20px;
            max-width: 1800px;
            margin: 0 auto;
            align-items: flex-start;
        }
        
        /* Left: Table Section */
        .table-section {
            flex: 3;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow-x: auto;
            min-height: 600px;
        }
        
        /* Right: Control Panel */
        .control-panel {
            flex: 1;
            min-width: 320px;
            max-width: 400px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 20px; /* 固定在右側 */
        }

        /* Form Elements */
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: var(--primary-color); font-size: 0.9em; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 4px; box-sizing: border-box; font-family: monospace; }
        .url-list { margin-bottom: 15px; max-height: 300px; overflow-y: auto; padding-right: 5px;}
        .url-item { display: flex; gap: 10px; margin-bottom: 10px; }
        .url-item input { flex-grow: 1; }
        button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn-add { background: #3498db; color: white; width: 100%; margin-bottom: 15px;}
        .btn-remove { background: #95a5a6; color: white; white-space: nowrap; }
        .btn-fetch { background: var(--action-color); color: white; font-size: 1.1em; width: 100%; padding: 15px; letter-spacing: 1px; }
        .btn-fetch:hover { background: #c0392b; }
        
        /* Transposed Data Table Styles */
        table { border-collapse: collapse; min-width: 100%; }
        th, td { padding: 15px; border: 1px solid var(--border-color); vertical-align: top; }
        
        /* 第一欄 (屬性名稱) 固定在左側 */
        th.row-header {
            background-color: var(--row-header-bg);
            color: white;
            position: sticky;
            left: 0;
            z-index: 10;
            width: 100px;
            text-align: center;
            border-right: 2px solid #2c3e50;
        }
        
        td.data-cell { min-width: 250px; background-color: #fff; }
        td.data-cell:hover { background-color: #fdfefe; }
        
        /* Specific row styling */
        tr.brand-row td { font-weight: bold; text-align: center; font-size: 1.2em; color: white; }
        tr.name-row td { font-weight: 600; color: var(--primary-color); font-size: 1.1em; line-height: 1.4; }
        tr.current-price-row td { font-weight: bold; color: #d35400; font-family: monospace; font-size: 1.3em; text-align: center; }
        tr.original-price-row td { text-decoration: line-through; color: #7f8c8d; text-align: center; }
        tr.discount-row td { color: #27ae60; font-weight: bold; text-align: center; }
        
        .specs-list { margin: 0; padding-left: 20px; font-size: 0.9em; color: #444; line-height: 1.6; }
        
        #loading { display: none; text-align: center; font-weight: bold; color: white; background: var(--action-color); padding: 15px; margin-bottom: 15px; border-radius: 4px; animation: pulse 1.5s infinite; }
        #error-log { color: #c0392b; font-family: monospace; white-space: pre-wrap; margin-top: 10px; font-size: 0.85em; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        /* RWD */
        @media (max-width: 1024px) {
            .app-wrapper { flex-direction: column-reverse; }
            .control-panel { position: static; width: 100%; max-width: none; }
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="table-section">
        <table id="dataTable">
            <tbody id="tableBody">
                <tr><td style="padding: 40px; text-align: center; color: #7f8c8d;">請於右側輸入網址並點擊抓取，資料將於此處生成。</td></tr>
            </tbody>
        </table>
    </div>

    <div class="control-panel">
        <div id="loading">⟳ Google 網路檢索解析中...</div>
        
        <div class="form-group">
            <label for="apiKey">Google API Key (本機記憶):</label>
            <input type="password" id="apiKey" placeholder="輸入 API 金鑰" onchange="saveState()">
        </div>
        <div class="form-group">
            <label for="aiModel">AI 檢索模型:</label>
            <select id="aiModel" onchange="saveState()">
                <option value="gemini-2.5-flash">Gemini 2.5 Flash (快速穩定)</option>
                <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                <option value="gemini-3.0-flash">Gemini 3.0 Flash</option>
            </select>
        </div>

        <label>競品網址列表 (URLs):</label>
        <div id="urlContainer" class="url-list"></div>
        <button class="btn-add" onclick="addUrl('')">+ 新增網址欄位</button>

        <button class="btn-fetch" onclick="fetchAndAnalyze()">開始橫向規格分析</button>
        <div id="error-log"></div>
    </div>
</div>

<script>
    // 預設廠牌識別色 (動態配給)
    const brandColorMap = {};
    const colorPalette = ['#3498db', '#e67e22', '#9b59b6', '#1abc9c', '#f1c40f', '#e74c3c', '#34495e'];
    let colorIndex = 0;

    function getBrandColor(brand) {
        const upperBrand = (brand || 'UNKNOWN').toUpperCase();
        if (!brandColorMap[upperBrand]) {
            brandColorMap[upperBrand] = colorPalette[colorIndex % colorPalette.length];
            colorIndex++;
        }
        return brandColorMap[upperBrand];
    }

    window.onload = function() {
        const savedKey = localStorage.getItem('ca_apiKey');
        const savedModel = localStorage.getItem('ca_model');
        const savedUrls = JSON.parse(localStorage.getItem('ca_urls') || '[]');

        if (savedKey) document.getElementById('apiKey').value = savedKey;
        if (savedModel) document.getElementById('aiModel').value = savedModel;

        if (savedUrls.length > 0) {
            savedUrls.forEach(url => addUrl(url));
        } else {
            addUrl('');
        }
    };

    function saveState() {
        localStorage.setItem('ca_apiKey', document.getElementById('apiKey').value);
        localStorage.setItem('ca_model', document.getElementById('aiModel').value);
        const urlInputs = document.querySelectorAll('.product-url');
        const urls = Array.from(urlInputs).map(input => input.value.trim()).filter(url => url !== '');
        localStorage.setItem('ca_urls', JSON.stringify(urls));
    }

    function addUrl(value = '') {
        const container = document.getElementById('urlContainer');
        const div = document.createElement('div');
        div.className = 'url-item';
        div.innerHTML = `<input type="text" class="product-url" value="${value}" placeholder="https://..." onchange="saveState()"><button class="btn-remove" onclick="removeUrl(this)">刪除</button>`;
        container.appendChild(div);
        saveState();
    }

    function removeUrl(button) { 
        button.parentElement.remove(); 
        saveState();
    }

    async function fetchAndAnalyze() {
        const apiKey = document.getElementById('apiKey').value;
        const model = document.getElementById('aiModel').value;
        const urlInputs = document.querySelectorAll('.product-url');
        const tableBody = document.getElementById('tableBody');
        const loading = document.getElementById('loading');
        const errorLog = document.getElementById('error-log');
        
        if (!apiKey) { alert('拒絕存取：請提供 API Key。'); return; }

        let urls = Array.from(urlInputs).map(input => input.value.trim()).filter(url => url !== '');
        if (urls.length === 0) { alert('請至少輸入一個產品網址。'); return; }

        saveState();
        errorLog.innerText = '';
        loading.style.display = 'block';
        tableBody.innerHTML = '<tr><td style="padding: 40px; text-align: center;">資料解析中，請稍候...</td></tr>';
        
        let productsData = [];

        for (const url of urls) {
            try {
                const aiResult = await callGeminiAPIWithSearch(apiKey, model, url);
                if (aiResult) productsData.push(aiResult);
            } catch (error) {
                errorLog.innerText += `[失敗] ${url}\n原因: ${error.message}\n\n`;
            }
        }

        loading.style.display = 'none';
        if (productsData.length > 0) {
            renderTransposedTable(productsData);
        } else {
            tableBody.innerHTML = '<tr><td style="padding: 40px; text-align: center; color: red;">所有抓取皆失敗，請檢查 API Key 或錯誤日誌。</td></tr>';
        }
    }

    async function callGeminiAPIWithSearch(apiKey, model, targetUrl) {
        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
        const prompt = `
        任務：產品規格萃取。使用 Google Search 檢索以下網址：${targetUrl}
        嚴格輸出純 JSON 物件，找不到請填 null。
        {
          "brand": "廠牌名稱",
          "name": "完整產品型號",
          "specs": ["規格1", "規格2", "規格3"],
          "originalPrice": 原始價格數字,
          "currentPrice": 當前價格數字,
          "discount": "折扣文字"
        }
        `;

        const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                tools: [{ googleSearch: {} }],
                generationConfig: { temperature: 0.1 }
            })
        });
        
        if (!response.ok) {
            const errData = await response.json();
            throw new Error(`HTTP ${response.status} - ${errData.error?.message || '未知錯誤'}`);
        }

        const data = await response.json();
        const textResponse = data.candidates[0].content.parts[0].text;
        
        const jsonMatch = textResponse.match(/\{[\s\S]*\}/);
        if (jsonMatch) return JSON.parse(jsonMatch[0]);
        throw new Error("模型未回傳標準 JSON 格式");
    }

    function renderTransposedTable(products) {
        const tableBody = document.getElementById('tableBody');
        
        // 依照廠牌排序，確保同廠牌產品排在相鄰的欄位
        products.sort((a, b) => {
            const brandA = (a.brand || 'ZZZ').toUpperCase();
            const brandB = (b.brand || 'ZZZ').toUpperCase();
            if (brandA !== brandB) return brandA.localeCompare(brandB);
            return (b.currentPrice || 0) - (a.currentPrice || 0);
        });

        // 建立轉置矩陣的各列 HTML
        let brandHtml = '<tr class="brand-row"><th class="row-header">廠牌</th>';
        let nameHtml = '<tr class="name-row"><th class="row-header">型號名稱</th>';
        let curPriceHtml = '<tr class="current-price-row"><th class="row-header">當前價格</th>';
        let origPriceHtml = '<tr class="original-price-row"><th class="row-header">原始價格</th>';
        let discountHtml = '<tr class="discount-row"><th class="row-header">折扣幅度</th>';
        let specsHtml = '<tr class="specs-row"><th class="row-header">核心規格</th>';

        products.forEach(p => {
            const brandName = p.brand || '未知';
            const bColor = getBrandColor(brandName);
            
            // 廠牌列套用動態背景色
            brandHtml += `<td class="data-cell" style="background-color: ${bColor};">${brandName}</td>`;
            nameHtml += `<td class="data-cell">${p.name || '-'}</td>`;
            curPriceHtml += `<td class="data-cell">${p.currentPrice ? '$' + p.currentPrice : '-'}</td>`;
            origPriceHtml += `<td class="data-cell">${p.originalPrice ? '$' + p.originalPrice : '-'}</td>`;
            discountHtml += `<td class="data-cell">${p.discount || '-'}</td>`;
            
            const specsList = (p.specs || []).map(s => `<li>${s}</li>`).join('');
            specsHtml += `<td class="data-cell"><ul class="specs-list">${specsList || '-'}</ul></td>`;
        });

        brandHtml += '</tr>';
        nameHtml += '</tr>';
        curPriceHtml += '</tr>';
        origPriceHtml += '</tr>';
        discountHtml += '</tr>';
        specsHtml += '</tr>';

        // 組合輸出
        tableBody.innerHTML = brandHtml + nameHtml + curPriceHtml + origPriceHtml + discountHtml + specsHtml;
    }
</script>

</body>
</html>
