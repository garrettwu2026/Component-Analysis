<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>競品規格與價格分析系統</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333;
            --border-color: #ddd;
            --primary-color: #2c3e50;
            --action-color: #e74c3c;
            --card-bg: #fff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .control-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
        }
        .url-list {
            margin-bottom: 15px;
        }
        .url-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .url-item input {
            flex-grow: 1;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-add { background: #3498db; color: white; }
        .btn-remove { background: #95a5a6; color: white; }
        .btn-fetch {
            background: var(--action-color);
            color: white;
            font-size: 1.2em;
            width: 100%;
            padding: 15px;
            margin-top: 10px;
        }
        .btn-fetch:hover { background: #c0392b; }
        
        /* Dashboard Layout */
        .dashboard {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 20px;
        }
        .brand-column {
            flex: 0 0 350px;
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-top: 5px solid;
        }
        .brand-title {
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border-color);
        }
        .product-card {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
            background: #fafafa;
        }
        .product-name {
            font-weight: bold;
            font-size: 1.1em;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        .price-section {
            display: flex;
            justify-content: space-between;
            background: #e8f4f8;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .current-price { color: #d35400; font-weight: bold; font-size: 1.2em; }
        .original-price { text-decoration: line-through; color: #7f8c8d; font-size: 0.9em; }
        .discount { color: #27ae60; font-weight: bold; font-size: 0.9em; }
        .specs-list {
            margin: 0;
            padding-left: 20px;
            font-size: 0.9em;
            color: #555;
        }
        #loading {
            display: none;
            text-align: center;
            font-weight: bold;
            color: var(--primary-color);
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="control-panel">
        <div class="form-group">
            <label for="apiKey">Google Gemini API Key:</label>
            <input type="password" id="apiKey" placeholder="輸入您的 API 金鑰">
        </div>
        <div class="form-group">
            <label for="aiModel">選擇 AI 模型:</label>
            <select id="aiModel">
                <option value="gemini-2.5-flash">Gemini 2.5 Flash (速度快，適合抓取與摘要)</option>
                <option value="gemini-2.5-pro">Gemini 2.5 Pro (推理強，適合複雜規格網頁)</option>
            </select>
        </div>

        <label>競品網址列表 (URLs):</label>
        <div id="urlContainer" class="url-list">
            <div class="url-item">
                <input type="text" class="product-url" placeholder="https://example.com/product-a">
                <button class="btn-remove" onclick="removeUrl(this)">刪除</button>
            </div>
        </div>
        <button class="btn-add" onclick="addUrl()">+ 新增網址</button>

        <button class="btn-fetch" onclick="fetchAndAnalyze()">抓取產品價格與規格</button>
    </div>

    <div id="loading">系統處理中：正在解析網頁與呼叫 AI 模型... </div>
    <div class="dashboard" id="dashboard">
        </div>
</div>

<script>
    // 預設一組高對比顏色用於區分不同廠牌
    const brandColors = ['#3498db', '#e67e22', '#9b59b6', '#1abc9c', '#f1c40f', '#34495e'];

    function addUrl() {
        const container = document.getElementById('urlContainer');
        const div = document.createElement('div');
        div.className = 'url-item';
        div.innerHTML = `
            <input type="text" class="product-url" placeholder="https://...">
            <button class="btn-remove" onclick="removeUrl(this)">刪除</button>
        `;
        container.appendChild(div);
    }

    function removeUrl(button) {
        button.parentElement.remove();
    }

    async function fetchAndAnalyze() {
        const apiKey = document.getElementById('apiKey').value;
        const model = document.getElementById('aiModel').value;
        const urlInputs = document.querySelectorAll('.product-url');
        const dashboard = document.getElementById('dashboard');
        const loading = document.getElementById('loading');
        
        if (!apiKey) {
            alert('請輸入 API Key。');
            return;
        }

        let urls = Array.from(urlInputs).map(input => input.value.trim()).filter(url => url !== '');
        if (urls.length === 0) {
            alert('請至少輸入一個產品網址。');
            return;
        }

        dashboard.innerHTML = '';
        loading.style.display = 'block';

        let productsData = [];

        for (const url of urls) {
            try {
                // 使用 CORS 代理抓取 HTML
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
                const response = await fetch(proxyUrl);
                const htmlText = await response.text();
                
                // 萃取純文本以減少 token 消耗 (簡化版 DOM 解析)
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                const rawText = doc.body.innerText.replace(/\s+/g, ' ').substring(0, 15000); // 截取前15000字元避免超載

                // 呼叫 Gemini API 進行結構化資料萃取
                const aiResult = await callGeminiAPI(apiKey, model, rawText);
                if (aiResult) {
                    productsData.push(aiResult);
                }

            } catch (error) {
                console.error(`讀取 ${url} 失敗:`, error);
                // 錯誤處理不中斷迴圈
            }
        }

        loading.style.display = 'none';
        renderDashboard(productsData);
    }

    async function callGeminiAPI(apiKey, model, text) {
        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
        
        const prompt = `
        你是一個嚴謹的產品規格分析系統。請閱讀以下網頁文本，並嚴格以 JSON 格式輸出以下資訊。如果找不到對應資訊，請填寫 null 或 "未知"。不要輸出任何 Markdown 標籤，純粹輸出 JSON 字串。
        格式要求：
        {
          "brand": "廠牌名稱 (大寫為主)",
          "name": "產品完整名稱",
          "specs": ["主要規格1 (如供電相數、晶片組)", "主要規格2", "主要規格3"],
          "originalPrice": 原始價格 (數字),
          "currentPrice": 當前價格 (數字),
          "discount": "折扣幅度 (例如: -15% 或 降價 500)"
        }
        
        網頁文本：
        ${text}
        `;

        try {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0.1 } // 降低溫度以確保格式穩定
                })
            });
            
            const data = await res.json();
            const textResponse = data.candidates[0].content.parts[0].text;
            
            // 清理可能包含的 Markdown JSON 標記
            const cleanJsonString = textResponse.replace(/```json/g, '').replace(/```/g, '').trim();
            return JSON.parse(cleanJsonString);

        } catch (err) {
            console.error('API 呼叫或解析失敗:', err);
            return null;
        }
    }

    function renderDashboard(products) {
        const dashboard = document.getElementById('dashboard');
        
        // 依照廠牌進行資料分組 (Group by Brand)
        const groupedData = products.reduce((acc, curr) => {
            const brand = (curr.brand || '未分類').toUpperCase();
            if (!acc[brand]) acc[brand] = [];
            acc[brand].push(curr);
            return acc;
        }, {});

        // 依照當前價格排序每個廠牌內的產品
        Object.keys(groupedData).forEach(brand => {
            groupedData[brand].sort((a, b) => (b.currentPrice || 0) - (a.currentPrice || 0)); // 價格高至低
        });

        let colorIndex = 0;

        for (const [brand, items] of Object.entries(groupedData)) {
            const color = brandColors[colorIndex % brandColors.length];
            colorIndex++;

            const colDiv = document.createElement('div');
            colDiv.className = 'brand-column';
            colDiv.style.borderTopColor = color;

            colDiv.innerHTML = `<div class="brand-title" style="color: ${color}">${brand}</div>`;

            items.forEach(product => {
                const specsHtml = (product.specs || []).map(s => `<li>${s}</li>`).join('');
                
                colDiv.innerHTML += `
                    <div class="product-card">
                        <div class="product-name">${product.name || '未知產品'}</div>
                        <div class="price-section">
                            <div>
                                <span class="current-price">$${product.currentPrice || 'N/A'}</span>
                                <br>
                                <span class="original-price">$${product.originalPrice || 'N/A'}</span>
                            </div>
                            <div class="discount">${product.discount || ''}</div>
                        </div>
                        <ul class="specs-list">${specsHtml}</ul>
                    </div>
                `;
            });

            dashboard.appendChild(colDiv);
        }
    }
</script>

</body>
</html>
